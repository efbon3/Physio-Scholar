name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint + format + types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run type-check

  unit:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:run

  e2e:
    name: E2E + accessibility (Playwright + axe)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests against production build
        # The CI Playwright config builds the app and starts `next start`
        # via webServer; Playwright polls the URL until ready.
        run: npm run test:e2e:ci
        env:
          CI: "true"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  db-test:
    name: DB migrations + RLS (pgTAP)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Start local Supabase
        # Pulls ~1 GB of Docker images on first run; ubuntu-latest has Docker
        # preinstalled. Subsequent runs reuse the image cache for this runner.
        run: npx supabase start
      - name: Apply migrations and run pgTAP tests
        # `supabase test db` resets the DB, replays all migrations, then runs
        # .sql files in supabase/tests/ via pg_prove.
        run: npm run db:test
      - name: Stop local Supabase
        if: always()
        run: npx supabase stop --no-backup
